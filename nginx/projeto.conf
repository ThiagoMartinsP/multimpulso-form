server {
    listen 80;
    server_name _;          # substitua pelo seu domínio, ex: meuprojeto.com.br

    # -----------------------------------------------------------------------
    # Frontend — arquivos estáticos do build React
    # -----------------------------------------------------------------------
    root /var/www/projeto/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;   # fallback para React Router
    }

    # -----------------------------------------------------------------------
    # Backend — proxy reverso para o FastAPI
    # -----------------------------------------------------------------------
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
